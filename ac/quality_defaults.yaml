# Explicit override template only. AC's canonical no-file defaults live in
# quality_model.DEFAULT_QUALITY_CONSTANTS. This file is never auto-loaded;
# opt in with AC_QUALITY_DEFAULTS=/path/to/override.yaml.
model:
  version: "effective_capacity_v2"
  legacy_version: "legacy_residual_v1"

spine:
  enabled: true
  form: "power_law_M_D"
  E: 1.69
  A: 406.4
  B: 410.7
  alpha: 0.34
  beta: 0.28
  uncertainty_in_regime: 0.03
  uncertainty_out_of_regime: 0.08
  source: "Hoffmann_et_al_2022_placeholder_defaults"

effective_capacity:
  enabled: true
  capacity_elasticity: 0.25
  tokens_per_total_param_half_saturation: 20.0
  # Wave 18h: exponent is signed around this parity utilization; below it
  # (fewer than ~half_saturation tokens per TOTAL param) sparse capacity is
  # under-trained and N_eff < N_active (MoE loses to equal-active dense).
  data_utilization_parity: 0.5
  capacity_multiplier: 1.0
  uncertainty: 0.50
  source: "uncalibrated_effective_sparse_capacity_prior"

# Wave 18h: one-sided undersized-vocabulary structural prior (see
# quality_model.DEFAULT_QUALITY_CONSTANTS["vocab_residual"] for rationale).
vocab_residual:
  enabled: true
  weight: 0.004
  cap: 0.015
  v_opt_ref: 128256
  n_ref: 7.0e9
  v_opt_exponent: 0.30
  v_opt_min: 32000
  v_opt_max: 512000
  uncertainty: 0.60
  source: "tao_2024_vocab_scaling_plus_frontier_practice_prior"

effective_data:
  enabled: true
  repeat_half_life_epochs: 4.0
  data_multiplier: 1.0
  overfit_penalty_weight: 0.0
  overfit_repetition_exponent: 1.0
  overfit_capacity_exponent: 1.0
  uncertainty: 0.40
  source: "muennighoff_effective_data_uncalibrated_prior"

context_utility:
  enabled: true
  uncertainty: 0.50
  source: "task_context_delta_relative_to_pretrain_context"

architecture_residual:
  enabled: true
  source: "coupled_width_depth_attention_residual"
  reference_d_model: 4096
  reference_d_head: 128
  d_head_ref: 128
  preferred_d_head: 128
  acceptable_d_head: [64, 128, 256]
  reference_kv_heads_min: 8
  reference_mlp_attn_ratio: 2.0
  reference_depth_width: 0.0078125
  # v1-fix: width/depth optimal aspect ratio. Override these to apply a
  # refit without changing Python source. To refit, regress
  #   log(d_model) ~ log(K_W) + gamma_W * log(N_active)
  #   log(n_layers) ~ log(K_D) + gamma_D * log(N_active)
  # against a curated table of dense architectures. The defaults below come
  # from a June 2026 fit against Llama-2-{7B,13B,70B}, Llama-3-{8B,70B},
  # Mistral-7B, Qwen3-{8B,32B}, GPT-3-175B.
  shape_law:
    K_W: 1.80
    gamma_W: 0.341
    K_D: 0.014
    gamma_D: 0.341
    C: 0.05                 # penalty strength (v1 audit: bumped 0.03→0.05; Tay 2021, Levine 2020)
    d_min: 256              # floor on d_opt
    l_min: 2                # floor on l_opt
    fit_source: "v1_fix_2026_06_refit_llama_mistral_qwen_gpt3"
  weights:
    width_depth_legacy_scale: 1.0
    mlp_attention: 0.0
    # v1-fix: head-shape weights bumped from 0.001 to give them real
    # influence on the optimum. The old 0.001 values let the optimizer
    # pick any (n_heads, d_head) freely since head-term swings (~0.0005)
    # were dominated by every other residual.
    d_head: 0.01
    query_heads: 0.005
    kv_heads: 0.003
    # v1-fix C1 (demo audit): symmetric KV-heads penalty for
    # n_kv_heads above max(kv_reference, n_heads/4). Calibrated against
    # measured 7B-class Pareto frontiers: at n_heads=72 / n_kv=72 vs
    # GQA-4 (kv=18), a weight of 0.005 produces ~0.02 absolute loss
    # delta — enough to overcome the "free param" spine win MHA gets
    # from its extra KV-cache weights, while keeping the penalty
    # bounded near the upper end of published GQA ablations (Ainslie
    # 2023; Llama-2-70B; Qwen-3). With the previous one-sided term,
    # the optimizer selected MHA on every greenfield run.
    kv_heads_excess: 0.008
    gqa_sharing: 0.0015
    attention_bottleneck: 0.003
    # v1-fix: FlashAttention efficiency cliff at d_head < threshold.
    attn_kernel_underrun: 0.003
  attn_kernel_underrun_threshold: 64
  uncertainty: 0.25
  head_uncertainty: 0.35

precision_residual:
  enabled: true
  source: "component_precision_sensitivity_with_hardware_feasibility"
  use_component_table: true
  default_uncertainty: 0.30

# Fix #12: precision penalties recalibrated against 2024-2025 empirical
# pretraining reports (FP8-LM, NVIDIA Transformer Engine, DeepSeek-V3 trained
# in FP8 with negligible loss, KIVI 2024 for INT4 KV). Old constants were
# ~5-10× too pessimistic for FP8 weights; the +7% precision residual a user
# saw for `weight=fp8 kv=int4` is now ~1-2%, which matches measured ablations
# at the 7B-13B scale.
precision_sensitivity:
  ffn:
    fp8: {delta: 0.002, uncertainty: 0.005, risk: "low"}
    fp4: {delta: 0.04, uncertainty: 0.04, risk: "medium"}
  attention_qkv:
    fp8: {delta: 0.004, uncertainty: 0.008, risk: "low_medium"}
    fp4: {delta: 0.06, uncertainty: 0.06, risk: "medium_high"}
  attention_o:
    fp8: {delta: 0.003, uncertainty: 0.007, risk: "low_medium"}
    fp4: {delta: 0.05, uncertainty: 0.05, risk: "medium_high"}
  qk_logits:
    fp8: {delta: 0.02, uncertainty: 0.03, risk: "medium"}
    fp32_accum: {delta: 0.00, uncertainty: 0.00, risk: "low"}
  router:
    fp8: {delta: 0.02, uncertainty: 0.03, risk: "medium"}
    bf16: {delta: 0.00, uncertainty: 0.00, risk: "low"}
  experts:
    int8: {delta: 0.01, uncertainty: 0.02, risk: "low_medium"}
    fp8: {delta: 0.003, uncertainty: 0.01, risk: "low"}
    fp4: {delta: 0.04, uncertainty: 0.05, risk: "medium"}
  kv_cache:
    int8: {delta: 0.001, uncertainty: 0.005, risk: "low"}
    int4: {delta: 0.012, uncertainty: 0.02, risk: "medium"}
  lm_head:
    fp8: {delta: 0.006, uncertainty: 0.012, risk: "low_medium"}
    fp4: {delta: 0.05, uncertainty: 0.06, risk: "medium_high"}
    bf16: {delta: 0.00, uncertainty: 0.00, risk: "low"}

moe_residual:
  enabled: true
  # v1 calibration sources:
  #   capacity     — Krajewski et al. (2024) + Mixtral 8x7B / DeepSeek-V2 priors
  #   granularity  — Krajewski granularity term, bonus above ref_g=8
  #   routing      — penalty per unit imbalance; 0 under balanced training
  #   shared_exp   — DeepSeek-V2 shared expert ablation bonus
  #   top_k1       — Switch top_k=1 penalty vs top_k>=2
  #   router_fp8   — fp8 router instability penalty
  source: "moe_capacity_krajewski_plus_mixtral_deepseek_priors"
  weights:
    capacity: 0.05         # ~6% loss reduction at Mixtral ratio (3.6x)
    granularity: -0.005    # small bonus above G=8 (negative weight)
    routing: 0.10          # only when load_balance < 1
    shared_experts: -0.005 # DeepSeek shared-expert bonus
    top_k1: 0.015          # Switch-style penalty
    router_fp8: 0.005      # fp8 router penalty
  capacity_ratio_cap: 4.0  # saturating cap so top_k=1 isn't over-rewarded
  reference_granularity: 8.0
  uncertainty: 0.40

state_residual:
  enabled: true
  source: "v2_family_specific_hybrid_ratio"
  reference_context_length: 8192
  families:
    mamba_sequential:
      p_low: 0.12
      p_high: 0.28
      preferred_p_attn: [0.14, 0.18]
      p_recall_min_general: 0.14
      p_recall_min_recall: 0.25
      confidence: "medium"
    gated_delta_or_kda_linear:
      p_low: 0.12
      p_high: 0.28
      preferred_p_attn: [0.14, 0.25]
      p_recall_min_general: 0.14
      p_recall_min_recall: 0.25
      confidence: "medium-high"
    generic_linear_attention:
      p_low: 0.12
      p_high: 0.28
      preferred_p_attn: [0.14, 0.25]
      p_recall_min_general: 0.14
      p_recall_min_recall: 0.25
      confidence: "medium"
    parallel_hybrid_heads:
      p_low: 0.10
      p_high: 0.35
      preferred_p_attn: [0.10, 0.25]
      p_recall_min_general: 0.10
      p_recall_min_recall: 0.20
      confidence: "medium-low"
    recurrent_local_attention:
      p_low: 0.10
      p_high: 0.35
      preferred_p_attn: [0.10, 0.30]
      p_recall_min_general: 0.10
      p_recall_min_recall: 0.20
      confidence: "medium-low"
  # Wave 18f (Jul 2026): w_under / w_recall raised so the quadratic
  # under-band and recall penalties can counterbalance the long-context
  # state benefit at p_attn -> 0 (pure SSM). See quality_model.py
  # DEFAULT_QUALITY_CONSTANTS for the full rationale.
  w_under: 0.35
  w_over: 0.03
  w_recall: 0.30
  w_capacity: 0.02
  w_kv_cost: 0.01
  compression_scale: 0.02
  composition_scale: 0.01
  d_state_reference: 192
  refresh_factor_weight: 0.5
  # Wave 5 long-context state benefit (kept in sync with code defaults).
  state_long_context_weight: 0.030
  state_long_context_ref_ctx: 8192
  state_long_context_sigmoid_scale: 5.0
  # Wave 18f: benefit is gated on attention presence; zero at p_attn=0.
  state_benefit_min_p_attn: 0.07
  min_delta: -0.10
  max_delta: 0.30
  uncertainty: 0.40
  uncertainty_outside_band: 0.55

downstream_head:
  enabled: false
  input_mode: "loss_proxy"
  alpha: 0.0
  beta: 1.0
  gamma: 0.0
  uncertainty: 0.80

data_quality:
  enabled: false
  mode: "none"
  effective_token_multiplier: 1.0
  uncertainty: 0.00

uncertainty:
  max_uncertainty: 0.95
  additive_interaction_bonus: 0.005

risk_residual:
  enabled: true
  source: "compiler_attention_and_architecture_risk_prior"
  uncertainty: 0.02
