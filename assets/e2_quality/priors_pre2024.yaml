# TEMPORAL-HOLDOUT quality prior for the E2 quality-anchor study.
# Consumed via: AC_QUALITY_DEFAULTS=<repo>/validation/e2_quality/priors_pre2024.yaml
# Deep-merged over ac.quality_model.DEFAULT_QUALITY_CONSTANTS by
# load_quality_constants(); only the keys below differ from stock.
#
# Split rule: keep pairs with publication_date < 2024-01-01 (arXiv v1;
# earliest public availability). Dates: pair_dates.yaml (tier T2).
# Kept 4 of 11 pairs; dropped 7.
# De-anchored terms (pairs>0 in the full corpus, 0 pre-cutoff) are
# zeroed through their own existing knobs — see build_priors_pre2024.py
# for the design rationale. Fitted per-term scales are NOT applied
# (cross-paper confounded, n<=2; recorded in split_summary.json).
#
# Generated deterministically by build_priors_pre2024.py; do not edit
# by hand — edit the script and re-run.

# --- de-anchored: effective_capacity (full-corpus n=1, pre-2024 n=0) ---
# Sole anchoring pair (DeepSeekMoE, 2024-01-11) is post-cutoff. `enabled:
# false` is consumed by _effective_capacity_transform and recovers N_eff =
# N_active. Dense anchors are unaffected (identity transform either way).
effective_capacity:
  enabled: false

# --- de-anchored: mtp_residual (full-corpus n=1, pre-2024 n=0) ---
# Sole anchoring pair (DeepSeek-V3, 2024-12-27) is post-cutoff. The block
# has no `enabled` consumer; bonus_per_depth: 0.0 zeroes the bonus. Dense
# non-MTP anchors are unaffected.
mtp_residual:
  bonus_per_depth: 0.0

# --- de-anchored: state_residual (full-corpus n=3, pre-2024 n=0) ---
# All three anchoring pairs are post-2023 (Waleffe 2024-06-12 x2, Jamba
# 2024-03-28). The term has no `enabled` consumer; clamping [min_delta,
# max_delta] to 0 zeroes its value for hybrid/state architectures. Dense
# anchors are unaffected (term is n/a for them).
state_residual:
  min_delta: 0.0
  max_delta: 0.0

temporal_holdout:
  cutoff: '2024-01-01'
  dating_rule: publication_date = earliest public availability (arXiv v1, UTC); pair
    of two papers dated at the later of the two
