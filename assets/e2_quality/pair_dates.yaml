# validation/e2_quality/pair_dates.yaml
# ----------------------------------------------------------------------------
# Gate 2 wave-1 header:
#   ac_version:            0.4.0
#   quality_model_version: effective_capacity_v2
#   git_commit:            c170cda
#   experiment_date:       2026-07-17
#   agent_wave:            gate2-wave1
#
# Date annotations for the shipped paired-ablation corpus
# (tests/fixtures/public_ablation_pairs_v1.json), which carries NO publication-
# date metadata of its own. One entry per pair id.
#
# Dating rule (documented in validation/prereg/e2_predictions.md):
#   publication_date = earliest public availability of the evidence, i.e. the
#   arXiv v1 submission date (UTC) of the paper/report the pair's `source`
#   cites. Venue publication dates (e.g. ICLR 2024 for YaRN) are NOT used:
#   the ablation numbers were public from the preprint date.
#   For a pair comparing TWO papers (peng2024_yarn_vs_pi), the pair date is the
#   LATER of the two v1 dates (the comparison needs both).
#
# All dates are bibliographic facts, tier T2 (official preprint record).
# Accessed 2026-07-17 via https://arxiv.org/abs/<id> ("Submission history").
# ----------------------------------------------------------------------------

